<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Роудмапа — ARASAKA</title>
  <link rel="icon" type="image/png" href="files/image/asa-logo-480.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --bg2:       #111111;
      --bg3:       #161616;
      --border:    #222222;
      --border2:   #2a2a2a;
      --text:      #f2f2f0;
      --muted:     #555555;
      --muted2:    #3a3a3a;
      --accent:    #c8a96e;
      --green:     #4caf6e;
      --green-dim: #1a3326;
      --red:       #cf4a4a;
      --font:      'Share Tech Mono', monospace;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* NAV — прозрачнее, логотип больше */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.5);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(34,34,34,0.5);
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      align-items: center;
      padding: 0 2rem; height: 56px;
    }
    .nav-logo { display: flex; align-items: center; }
    .nav-logo img { height: 38px; width: 38px; object-fit: contain; border-radius: 10px; }

    nav ul { list-style: none; display: flex; gap: 2rem; justify-content: center; }
    nav ul a { font-size: 12px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; transition: color .2s; padding: 4px 0; position: relative; }
    nav ul a::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 1px; background: var(--accent); transform: scaleX(0); transition: transform .2s; }
    nav ul a:hover { color: var(--text); }
    nav ul a:hover::after { transform: scaleX(1); }
    nav ul a.active { color: var(--accent); }
    nav ul a.active::after { transform: scaleX(1); }

    .page { max-width: 860px; margin: 0 auto; padding: 4rem 2rem 6rem; }

    .section-label { font-size: 11px; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.4rem; }
    .page-title { font-size: clamp(1.6rem, 4vw, 2.4rem); letter-spacing: 0.18em; color: var(--text); text-transform: uppercase; margin-bottom: 0.5rem; }
    .page-subtitle { color: var(--muted); font-size: 12px; letter-spacing: 0.1em; margin-bottom: 3rem; }

    .stats-row { display: flex; gap: 1.5rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); padding: 1rem 1.5rem; flex: 1; min-width: 120px; }
    .stat-value { font-size: 1.8rem; letter-spacing: 0.05em; line-height: 1; margin-bottom: 4px; }
    .stat-value.green { color: var(--green); }
    .stat-value.gold  { color: var(--accent); }
    .stat-value.muted { color: var(--muted); }
    .stat-label { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

    .progress-section { margin-bottom: 2.5rem; }
    .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.6rem; }
    .progress-title { font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
    .progress-pct { font-size: 1.1rem; letter-spacing: 0.1em; color: var(--green); text-shadow: 0 0 12px rgba(76,175,110,0.55); }
    .progress-track { height: 6px; background: var(--bg3); border: 1px solid var(--border2); position: relative; overflow: visible; border-radius: 3px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #2d7a4e, var(--green)); transition: width 1s cubic-bezier(.4,0,.2,1); position: relative; border-radius: 3px; box-shadow: 0 0 6px rgba(76,175,110,0.5), 0 0 18px rgba(76,175,110,0.25), 0 0 40px rgba(76,175,110,0.10); }
    .progress-fill::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); height: 200%; width: 3px; background: rgba(180,255,210,0.85); border-radius: 2px; filter: blur(2px); animation: pulse-tip 1.6s ease-in-out infinite alternate; }
    @keyframes pulse-tip { from { opacity: 0.5; box-shadow: 0 0 4px rgba(76,175,110,0.4); } to { opacity: 1; box-shadow: 0 0 12px rgba(76,175,110,0.9); } }

    .segments-track { display: flex; gap: 3px; margin-top: 8px; }
    .seg { flex: 1; height: 3px; background: var(--border2); border-radius: 2px; transition: background .4s, box-shadow .4s; }
    .seg.done { background: var(--green); box-shadow: 0 0 4px rgba(76,175,110,0.6), 0 0 10px rgba(76,175,110,0.25); }

    .timeline { position: relative; padding-left: 2px; }
    .timeline-spine { position: absolute; left: 20px; top: 0; bottom: 0; width: 1px; background: var(--border); z-index: 0; }
    .timeline-spine-fill { position: absolute; left: 0; top: 0; width: 100%; background: linear-gradient(to bottom, #2d7a4e, var(--green)); transition: height 1.2s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 6px rgba(76,175,110,0.5), 0 0 20px rgba(76,175,110,0.2); border-radius: 1px; }

    .step { display: flex; align-items: flex-start; gap: 1.2rem; position: relative; z-index: 1; margin-bottom: 0; opacity: 0; transform: translateX(-12px); animation: step-in .4s forwards; }
    @keyframes step-in { to { opacity: 1; transform: translateX(0); } }

    .step-dot-wrap { width: 40px; flex-shrink: 0; display: flex; justify-content: center; padding-top: 18px; }
    .step-dot { width: 14px; height: 14px; border: 2px solid var(--border2); background: var(--bg); display: flex; align-items: center; justify-content: center; transition: border-color .3s, box-shadow .3s; flex-shrink: 0; }
    .step-dot.done { border-color: var(--green); background: var(--green-dim); box-shadow: 0 0 8px rgba(76,175,110,0.55), 0 0 18px rgba(76,175,110,0.20); }
    .step-dot-inner { width: 6px; height: 6px; background: var(--muted2); }
    .step-dot.done .step-dot-inner { background: var(--green); box-shadow: 0 0 4px rgba(76,175,110,0.8); }

    .step-body { flex: 1; border: 1px solid var(--border); background: var(--bg2); padding: 1rem 1.2rem; transition: border-color .3s, background .3s; margin: 8px 0; }
    .step-body:hover { border-color: var(--border2); background: var(--bg3); }
    .step.done-step .step-body { border-color: #1e3d2a; background: #0f1f17; }
    .step.done-step .step-body:hover { border-color: #2a5038; }

    .step-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .step-index { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); }
    .step-name { font-size: 13px; letter-spacing: 0.1em; color: var(--text); flex: 1; }
    .step.done-step .step-name { color: #a0c8b0; }

    .step-badge { font-size: 9px; letter-spacing: 0.2em; padding: 2px 8px; text-transform: uppercase; border: 1px solid; white-space: nowrap; }
    .badge-done    { color: var(--green); border-color: var(--green); background: rgba(76,175,110,0.08); box-shadow: 0 0 8px rgba(76,175,110,0.2); }
    .badge-wip     { color: var(--accent); border-color: var(--accent); background: rgba(200,169,110,0.06); }
    .badge-pending { color: var(--muted); border-color: var(--muted2); background: transparent; }

    footer {
      border-top: 1px solid var(--border);
      background: var(--bg2);
      padding: 1.5rem 2rem;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
      font-size: 11px; letter-spacing: 0.1em; color: var(--muted);
    }
    footer ul { list-style: none; display: flex; gap: 1.5rem; }
    footer ul a { transition: color .2s; }
    footer ul a:hover { color: var(--accent); }
    .footer-status { display: flex; gap: 1.5rem; }
    .status-dot { display: inline-block; width: 6px; height: 6px; background: #3d9e3d; border-radius: 50%; margin-right: 6px; box-shadow: 0 0 5px #3d9e3d; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── BURGER ── */
    .burger {
      display: none;
      flex-direction: column; justify-content: center; align-items: center;
      width: 38px; height: 38px; gap: 5px; cursor: pointer;
      background: none; border: none; padding: 0; z-index: 200;
    }
    .burger span {
      display: block; width: 22px; height: 1.5px;
      background: var(--muted); border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s, background 0.2s;
      transform-origin: center;
    }
    .burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); background: var(--text); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); background: var(--text); }

    /* ── MOBILE DRAWER ── */
    .mobile-drawer {
      display: none;
      position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.97); backdrop-filter: blur(16px);
      z-index: 150; flex-direction: column;
      padding: 24px 20px; border-top: 1px solid rgba(34,34,34,0.5);
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .mobile-drawer.open { opacity: 1; pointer-events: all; }
    .mobile-drawer ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .mobile-drawer ul a {
      display: block; padding: 14px 16px;
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      border: 1px solid transparent; border-radius: 6px; transition: all 0.15s;
    }
    .mobile-drawer ul a:hover { color: var(--text); background: var(--bg2); border-color: var(--border); }
    .mobile-drawer ul a.active { color: var(--accent); }
    .mobile-drawer-sep { height: 1px; background: var(--border); margin: 16px 0; }
    .mobile-drawer-discord {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px;
      background: rgba(200,169,110,0.06); border: 1px solid rgba(200,169,110,0.25);
      border-radius: 8px; color: var(--text); text-decoration: none;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    }

    @media (max-width: 768px) {
      nav { padding: 0 1rem; grid-template-columns: auto 1fr auto; }
      nav ul { display: none; }
      .burger { display: flex; }
      .mobile-drawer { display: flex; }
      .page { padding: 2rem 1rem 4rem; }
      .stats-row { flex-direction: column; gap: 1px; }
      .step-header { flex-wrap: wrap; gap: 6px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <img src="files/image/asa-logo-480.png" alt="Arasaka" />
  </a>
  <ul>
    <li><a href="index.html">Главная</a></li>

  </ul>
  <button class="burger" id="burger" aria-label="Меню">

<div class="mobile-drawer" id="mobile-drawer">
  <ul>
    <li><a href="index.html">Главная</a></li>
    <li><a href="wiki.html">Вики</a></li>

  </ul>
  <div class="mobile-drawer-sep"></div>
  <a href="https://discord.gg/SpufupDBB4" class="mobile-drawer-discord" target="_blank">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Discord
  </a>
</div>

<main class="page">
  <div class="section-label">01 // РАЗВИТИЕ САЙТА</div>
  <h1 class="page-title">ROADMAP</h1>
  <p class="page-subtitle" id="subtitle">Загрузка данных...</p>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value green" id="stat-done">—</div><div class="stat-label">Готово</div></div>
    <div class="stat-card"><div class="stat-value muted" id="stat-left">—</div><div class="stat-label">В работе</div></div>
    <div class="stat-card"><div class="stat-value gold" id="stat-total">—</div><div class="stat-label">Всего этапов</div></div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">Общий прогресс</span>
      <span class="progress-pct" id="pct-label">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="segments-track" id="segments-track"></div>
  </div>

  <div class="timeline" id="timeline">

    </div>
  </div>
</main>

<footer>
  <div>© ARASAKA CLAN · С 28.12.2020</div>
  <ul>
    <li><a href="wiki.html">Вики</a></li>
    <li><a href="wiki.html#intro">Правила</a></li>
    <li><a href="https://discord.gg/SpufupDBB4" target="_blank">Discord</a></li>
  </ul>
  <div class="footer-status">
    <span><span class="status-dot"></span>АКТИВЕН</span>
    <span>35+ УЧАСТНИКОВ</span>
  </div>
</footer>

<script src="files/roadmap.js"></script>
<script>
/* ── Burger ── */
const burger = document.getElementById('burger');
const drawer = document.getElementById('mobile-drawer');
burger.addEventListener('click', () => {
  const open = burger.classList.toggle('open');
  drawer.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
});
drawer.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => {
    burger.classList.remove('open');
    drawer.classList.remove('open');
    document.body.style.overflow = '';
  });
});
</script>
<script>
(function () {
  const timeline  = document.getElementById('timeline');
  const spineFill = document.getElementById('spine-fill');
  const progFill  = document.getElementById('progress-fill');
  const pctLabel  = document.getElementById('pct-label');
  const statDone  = document.getElementById('stat-done');
  const statLeft  = document.getElementById('stat-left');
  const statTotal = document.getElementById('stat-total');
  const segTrack  = document.getElementById('segments-track');
  const subtitle  = document.getElementById('subtitle');

  if (typeof ROADMAP === 'undefined' || !Array.isArray(ROADMAP)) {
    timeline.innerHTML += '<p style="color:#555;padding:2rem">Не удалось загрузить roadmap.js</p>';
    return;
  }

  const total = ROADMAP.length;
  const done  = ROADMAP.filter(s => s.done === 1).length;
  const left  = total - done;
  const pct   = total === 0 ? 0 : Math.round((done / total) * 100);

  statDone.textContent  = done;
  statLeft.textContent  = left;
  statTotal.textContent = total;
  subtitle.textContent  = `${done} из ${total} этапов завершено · ${left} остаётся`;

  ROADMAP.forEach(s => {
    const seg = document.createElement('div');
    seg.className = 'seg' + (s.done ? ' done' : '');
    segTrack.appendChild(seg);
  });

  ROADMAP.forEach((step, i) => {
    const isDone = step.done === 1;
    const wrapper = document.createElement('div');
    wrapper.className = 'step' + (isDone ? ' done-step' : '');
    wrapper.style.animationDelay = (i * 60) + 'ms';
    const badge = isDone
      ? '<span class="step-badge badge-done">ГОТОВО</span>'
      : (i === ROADMAP.findIndex(s => !s.done)
          ? '<span class="step-badge badge-wip">В РАБОТЕ</span>'
          : '<span class="step-badge badge-pending">ОЖИДАЕТ</span>');
    wrapper.innerHTML = `
      <div class="step-dot-wrap">
        <div class="step-dot${isDone ? ' done' : ''}">
          <div class="step-dot-inner"></div>
        </div>
      </div>
      <div class="step-body">
        <div class="step-header">
          <span class="step-index">${String(i + 1).padStart(2, '0')}</span>
          <span class="step-name">${step.name}</span>
          ${badge}
        </div>
      </div>
    `;
    timeline.appendChild(wrapper);
  });

  setTimeout(() => {
    progFill.style.width = pct + '%';
    pctLabel.textContent = pct + '%';
    const lastDoneIndex = ROADMAP.map(s => s.done).lastIndexOf(1);
    if (lastDoneIndex >= 0) {
      const spinePct = total <= 1 ? 100 : Math.round(((lastDoneIndex + 0.5) / total) * 100);
      spineFill.style.height = spinePct + '%';
    }
  }, 200);
})();
</script>
</body>
